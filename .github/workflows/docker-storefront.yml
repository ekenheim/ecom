name: Build and Push Storefront

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - storefront/**
      - .github/workflows/docker-storefront.yml

jobs:
  build:
    runs-on: gha-runner-scale-set-ecom
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ekenheim/ecom/storefront
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/ekenheim/ecom/storefront:buildcache
          cache-to: type=registry,ref=ghcr.io/ekenheim/ecom/storefront:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_REGION=${{ secrets.NEXT_PUBLIC_DEFAULT_REGION }}
            NEXT_PUBLIC_FEATURE_SEARCH_ENABLED=true
            NEXT_PUBLIC_SEARCH_ENDPOINT=${{ secrets.NEXT_PUBLIC_SEARCH_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_API_KEY=${{ secrets.NEXT_PUBLIC_SEARCH_API_KEY }}
            NEXT_PUBLIC_MEILISEARCH_HOST=${{ secrets.NEXT_PUBLIC_SEARCH_ENDPOINT }}
            NEXT_PUBLIC_MEILISEARCH_SEARCH_API_KEY=${{ secrets.NEXT_PUBLIC_SEARCH_API_KEY }}
